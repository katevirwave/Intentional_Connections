# Maestro smoke: opens the dev URL in Expo Go, then asserts our Setup screen (no .env).
#
#   npx expo start --port 8081
#   maestro test maestro/app.yaml -e EXPO_DEV_URL="exp://127.0.0.1:8081"
#
# Uses testID from app/setup.tsx for a stable selector.

appId: host.exp.Exponent
---
- openLink: ${EXPO_DEV_URL}
- extendedWaitUntil:
    visible:
      id: 'setup-missing-supabase'
    timeout: 120000
